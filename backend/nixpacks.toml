[phases.setup]
nixPkgs = ["python311"]
paths = ["/root/.local/bin", "/usr/local/bin"]

[phases.install]
dependsOn = ["setup"]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements.txt"]

[phases.build]
dependsOn = ["install"]
cmds = ["echo 'Build complete'"]

[start]
cmd = "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
